<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* Bottom Tools Panel Layout */
        .custom-panel {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: row; /* ഹൊറിസോണ്ടൽ ലേഔട്ട് */
            gap: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            border: 1px solid rgba(229, 18, 201, 0.3);
            width: max-content;
            max-width: 95vw;
        }

        .custom-btn {
            background: #ffffff;
            border: 2px solid #e512c9;
            cursor: pointer;
            width: 50px !important;
            height: 50px !important;
            font-size: 22px !important;
            border-radius: 12px !important;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .custom-btn:active {
            background-color: #fce7f9;
            transform: scale(0.9);
        }

        /* Layer Info Pop-up window */
        #layerInfo {
            position: absolute;
            top: 75px;
            left: 12px;
            right: 12px;
            z-index: 9999;
            background: rgba(255, 255, 255, 0.95);
            padding: 16px;
            border-radius: 14px;
            max-height: 35vh;
            overflow-y: auto;
            border: 2px solid #e512c9;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none;
            font-size: 15px;
            line-height: 1.5;
        }

        .info-close {
            float: right;
            color: red;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
        }

        /* QGIS OpenLayers Default Controls Configuration */
        .ol-control button {
            background-color: #ffffff !important;
            color: #e512c9 !important;
            border-radius: 8px !important;
            width: 42px !important;
            height: 42px !important;
            font-size: 20px !important;
        }
        
        /* Zoom Control Top Left */
        .ol-zoom {
            top: 12px !important;
            left: 12px !important;
        }
        
        /* Layer Switcher - Top Right Floating */
        .layer-switcher {
            top: 12px !important;
            right: 12px !important;
        }
        .layer-switcher button {
            width: 52px !important;
            height: 52px !important;
            background-size: 28px 28px !important;
            border: 2px solid #e512c9 !important;
            border-radius: 12px !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .btn-active {
            background-color: #e512c9 !important;
            color: white !important;
        }
        </style>
    </head>
    <body>

        <div id="layerInfo">
            <span class="info-close" onclick="document.getElementById('layerInfo').style.display='none'">✕</span>
            <div id="layerInfoContent"></div>
        </div>

        <div class="custom-panel">
            <button class="custom-btn" id="gpsBtn" title="Live GPS">📍</button>
            <button class="custom-btn" id="directionBtn" title="Get Direction">🧭</button>
            <button class="custom-btn" id="noteBtn" title="Add Note">📝</button>
            <button class="custom-btn" id="uploadBtn" title="Upload KML/GeoJSON">⬆️</button>
            <button class="custom-btn" id="downloadBtn" title="Download Location">⬇️</button>
        </div>

        <input type="file" id="fileInput" accept=".kml,.geojson,.json" style="display:none">

        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="resources/proj4.js"></script>
        <script>
            proj4.defs('EPSG:3857','+proj=merc +a=6378137 +b=6378137 +lat_ts=0 +lon_0=0 +x_0=0 +y_0=0 +k=1 +units=m +nadgrids=@null +wktext +no_defs');
        </script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/olms.js"></script>
        <script src="layers/VillageBoundary_3.js"></script>
        <script src="layers/Surveyline_4.js"></script>
        <script src="styles/VillageBoundary_3_style.js"></script>
        <script src="styles/Surveyline_4_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>        
        <script src="https://cdn.jsdelivr.net/npm/@tmcw/togeojson@5.8.1/dist/togeojson.umd.js"></script>

<script>
// 1. Layer Switcher സെറ്റപ്പ് (Top Right Floating)
var layerSwitcher = new ol.control.LayerSwitcher({
    activationMode: 'click',
    tipLabel: 'Layers',
    groupSelectStyle: 'children'
});
map.addControl(layerSwitcher);

// 2. Live GPS Tracking
let gpsEnabled = false;
let watchId = null;
let gpsLayer = null;

document.getElementById('gpsBtn').onclick = function(){
    let btn = this;
    if(!gpsEnabled){
        if (navigator.geolocation) {
            btn.classList.add('btn-active');
            gpsEnabled = true;
            watchId = navigator.geolocation.watchPosition(function(pos){
                let coords = ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]);
                
                if(gpsLayer){ map.removeLayer(gpsLayer); }

                gpsLayer = new ol.layer.Vector({
                    source: new ol.source.Vector({
                        features: [new ol.Feature({ geometry: new ol.geom.Point(coords) })]
                    }),
                    style: new ol.style.Style({
                        image: new ol.style.Circle({
                            radius: 9,
                            fill: new ol.style.Fill({color: '#127be5'}),
                            stroke: new ol.style.Stroke({color: '#fff', width: 3})
                        })
                    })
                });
                map.addLayer(gpsLayer);
                map.getView().animate({ center: coords, zoom: 19, duration: 500 });
            }, function(err){
                alert("Location Permission അനുവദിക്കുക.");
                btn.classList.remove('btn-active');
                gpsEnabled = false;
            }, { enableHighAccuracy: true });
        }
    } else {
        navigator.geolocation.clearWatch(watchId);
        if(gpsLayer){ map.removeLayer(gpsLayer); }
        btn.classList.remove('btn-active');
        gpsEnabled = false;
    }
};

// 3. Google Maps Direction
let directionMode = false;
document.getElementById('directionBtn').onclick = function(){
    directionMode = !directionMode;
    this.classList.toggle('btn-active', directionMode);
    if(directionMode) alert('മാപ്പിൽ പോവേണ്ട സ്ഥലത്ത് ക്ലിക്ക് ചെയ്യുക.');
};

// 4. Notes Adding System
let noteMode = false;
let notesLayer = new ol.layer.Vector({ source: new ol.source.Vector() });
map.addLayer(notesLayer);

document.getElementById('noteBtn').onclick = function(){
    noteMode = !noteMode;
    this.classList.toggle('btn-active', noteMode);
    if(noteMode) alert('നോട്ട് ചേർക്കേണ്ട സ്ഥലത്ത് ക്ലിക്ക് ചെയ്യുക.');
};

// 5. KML/GeoJSON Upload
document.getElementById('uploadBtn').onclick = function(){
    document.getElementById('fileInput').click();
};

document.getElementById('fileInput').addEventListener('change', function(e){
    let file = e.target.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = function(evt){
        let text = evt.target.result;
        let features;
        if(file.name.endsWith('.geojson') || file.name.endsWith('.json')){
            features = new ol.format.GeoJSON().readFeatures(text, { featureProjection: 'EPSG:3857' });
        } else if(file.name.endsWith('.kml')){
            let parser = new DOMParser();
            let kml = parser.parseFromString(text, 'text/xml');
            let geojson = toGeoJSON.kml(kml);
            features = new ol.format.GeoJSON().readFeatures(geojson, { featureProjection: 'EPSG:3857' });
        }
        if(features && features.length > 0){
            let source = new ol.source.Vector({ features: features });
            let layer = new ol.layer.Vector({ source: source });
            map.addLayer(layer);
            map.getView().fit(source.getExtent(), { padding: [50, 50, 50, 50], duration: 1000 });
            alert('ലെയർ അപ്‌ലോഡ് ചെയ്തു.');
        }
    };
    reader.readAsText(file);
});

// 6. Download Location
document.getElementById('downloadBtn').onclick = function(){
    let center = ol.proj.toLonLat(map.getView().getCenter());
    let geojson = {
        type: 'FeatureCollection',
        features: [{
            type: 'Feature',
            geometry: { type: 'Point', coordinates: center },
            properties: { name: 'Saved Mobile Location' }
        }]
    };
    let data = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(geojson));
    let a = document.createElement('a');
    a.href = data;
    a.download = 'map_location.geojson';
    a.click();
};

// 7. Area & Length Calculations
function formatLength(line) {
    let length = ol.sphere.getLength(line);
    return (length > 100) ? (length / 1000).toFixed(2) + ' km' : length.toFixed(2) + ' meter';
}

function formatArea(polygon) {
    let area = ol.sphere.getArea(polygon);
    let cent = area / 40.468564224;
    if (cent >= 100) {
        return (cent / 100).toFixed(2) + ' Acre (' + cent.toFixed(1) + ' Cent)';
    }
    return cent.toFixed(2) + ' Cent';
}

// ക്ലിക്ക് ചെയ്യുമ്പോൾ ഉള്ള പ്രവർത്തനങ്ങൾ
map.on('singleclick', function(evt){
    if(directionMode){
        let coord = ol.proj.toLonLat(evt.coordinate);
        let url = 'https://www.google.com/maps/dir/?api=1&destination=' + coord[1] + ',' + coord[0];
        window.open(url, '_blank');
        directionMode = false;
        document.getElementById('directionBtn').classList.remove('btn-active');
        return;
    }

    if(noteMode){
        let noteText = prompt("നോട്ട് എഴുതുക:");
        if(noteText){
            let f = new ol.Feature({ geometry: new ol.geom.Point(evt.coordinate) });
            f.setStyle(new ol.style.Style({
                image: new ol.style.Circle({ radius: 6, fill: new ol.style.Fill({color: 'red'}) }),
                text: new ol.style.Text({ text: noteText, scale: 1.3, offsetY: -15, fill: new ol.style.Fill({color: '#000'}), backgroundFill: new ol.style.Fill({color: '#fff'}) })
            }));
            notesLayer.getSource().addFeature(f);
        }
        noteMode = false;
        document.getElementById('noteBtn').classList.remove('btn-active');
        return;
    }

    let info = '';
    map.forEachFeatureAtPixel(evt.pixel, function(feature){
        let props = feature.getProperties();
        let geom = feature.getGeometry();
        
        info += "<div style='border-bottom:1px solid #ccc; padding-bottom:5px; margin-bottom:5px;'>";
        
        if (geom instanceof ol.geom.Polygon) {
            info += '<b>📐 അളവ് (Area):</b> ' + formatArea(geom) + '<br>';
        } else if (geom instanceof ol.geom.LineString) {
            info += '<b>📏 നീളം (Length):</b> ' + formatLength(geom) + '<br>';
        }

        for(let key in props){
            if(key !== 'geometry' && key !== 'boundedBy'){
                info += '<b>' + key + ':</b> ' + props[key] + '<br>';
            }
        }
        info += "</div>";
    });

    if(info !== ''){
        document.getElementById('layerInfo').style.display = 'block';
        document.getElementById('layerInfoContent').innerHTML = info;
    }
});
</script>
</body>
</html>
