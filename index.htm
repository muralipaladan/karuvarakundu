        html, body, #map {
            width: 100%;

        <title></title>
    
<style>
/* Mobile Friendly */
.ol-control button,
.layer-switcher button,
.custom-btn {
    width: 52px !important;
    height: 52px !important;
    font-size: 22px !important;
    border-radius: 10px !important;
}

.custom-panel {
    position:absolute;
    top:10px;
    right:10px;
    z-index:9999;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.custom-btn {
    background:#fff;
    border:1px solid #999;
    cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

#surveySearch {
    position:absolute;
    top:10px;
    left:70px;
    z-index:9999;
    width:220px;
    padding:12px;
    border-radius:10px;
    border:1px solid #999;
    font-size:16px;
}

</head>
    <body>
        
<input type="text" id="surveySearch" placeholder="Search Survey Number">

<div class="custom-panel">
<button class="custom-btn" id="gpsBtn">📍</button>
<button class="custom-btn" id="directionBtn">🧭</button>
<button class="custom-btn" id="uploadBtn">⬆</button>
<button class="custom-btn" id="downloadBtn">⬇</button>
<button class="custom-btn" id="toggleToolsBtn">🛠</button>
</div>

<input type="file" id="fileInput" accept=".kml,.geojson,.json" style="display:none">

<div id="layerInfo"></div>

<div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>
        <script src="resources/qgis2web_expressions.js"></script>
<script src="resources/proj4.js"></script>
        <script>proj4.defs('EPSG:3857','+proj=merc +a=6378137 +b=6378137 +lat_ts=0 +lon_0=0 +x_0=0 +y_0=0 +k=1 +units=m +nadgrids=@null +wktext +no_defs');</script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="resources/olms.js"></script>
        <script src="layers/VillageBoundary_3.js"></script><script src="layers/Surveyline_4.js"></script>
        <script src="styles/VillageBoundary_3_style.js"></script><script src="styles/Surveyline_4_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>        
    
<script src="https://cdn.jsdelivr.net/npm/@tmcw/togeojson@5.8.1/dist/togeojson.umd.js"></script>

<script>

let gpsEnabled = false;
let gpsLayer = null;

document.getElementById('gpsBtn').onclick = function(){

    if(!gpsEnabled){

        navigator.geolocation.watchPosition(function(pos){

            let coords = ol.proj.fromLonLat([
                pos.coords.longitude,
                pos.coords.latitude
            ]);

            if(gpsLayer){
                map.removeLayer(gpsLayer);
            }

            gpsLayer = new ol.layer.Vector({
                source:new ol.source.Vector({
                    features:[
                        new ol.Feature({
                            geometry:new ol.geom.Point(coords)
                        })
                    ]
                })
            });

            map.addLayer(gpsLayer);

            map.getView().animate({
                center:coords,
                zoom:18
            });

        });

        gpsEnabled = true;

    } else {

        if(gpsLayer){
            map.removeLayer(gpsLayer);
        }

        gpsEnabled = false;
    }
};

document.getElementById('directionBtn').onclick = function(){

    map.once('click', function(evt){

        let coord = ol.proj.toLonLat(evt.coordinate);

        let url =
            'https://www.google.com/maps/dir/?api=1&destination=' +
            coord[1] + ',' + coord[0];

        window.open(url, '_blank');
    });

    alert('Click map for direction');
};

document.getElementById('uploadBtn').onclick = function(){
    document.getElementById('fileInput').click();
};

document.getElementById('fileInput').addEventListener('change', function(e){

    let file = e.target.files[0];

    if(!file) return;

    let reader = new FileReader();

    reader.onload = function(evt){

        let text = evt.target.result;

        if(file.name.endsWith('.geojson') || file.name.endsWith('.json')){

            let features = new ol.format.GeoJSON().readFeatures(text, {
                featureProjection:'EPSG:3857'
            });

            let source = new ol.source.Vector({
                features:features
            });

            let layer = new ol.layer.Vector({
                source:source
            });

            map.addLayer(layer);

            map.getView().fit(source.getExtent());
        }

        if(file.name.endsWith('.kml')){

            let parser = new DOMParser();

            let kml = parser.parseFromString(text, 'text/xml');

            let geojson = toGeoJSON.kml(kml);

            let features = new ol.format.GeoJSON().readFeatures(geojson, {
                featureProjection:'EPSG:3857'
            });

            let source = new ol.source.Vector({
                features:features
            });

            let layer = new ol.layer.Vector({
                source:source
            });

            map.addLayer(layer);

            map.getView().fit(source.getExtent());
        }
    };

    reader.readAsText(file);
});

document.getElementById('downloadBtn').onclick = function(){

    let center = ol.proj.toLonLat(map.getView().getCenter());

    let geojson = {
        type:'FeatureCollection',
        features:[{
            type:'Feature',
            geometry:{
                type:'Point',
                coordinates:center
            },
            properties:{
                name:'Map Center'
            }
        }]
    };

    let data =
        'data:text/json;charset=utf-8,' +
        encodeURIComponent(JSON.stringify(geojson));

    let a = document.createElement('a');

    a.href = data;
    a.download = 'map_location.geojson';

    a.click();
};

let visible = true;

document.getElementById('toggleToolsBtn').onclick = function(){

    let controls = document.querySelectorAll('.ol-control');

    controls.forEach(function(ctrl){

        ctrl.style.display = visible ? 'none' : 'block';
    });

    visible = !visible;
};

document.getElementById('surveySearch').addEventListener('keypress', function(e){

    if(e.key === 'Enter'){

        let value = this.value.toLowerCase();

        let found = false;

        map.getLayers().forEach(function(layer){

            if(layer instanceof ol.layer.Vector){

                layer.getSource().getFeatures().forEach(function(feature){

                    let props = feature.getProperties();

                    for(let key in props){

                        if(String(props[key]).toLowerCase().includes(value)){

                            map.getView().fit(
                                feature.getGeometry().getExtent(),
                                {maxZoom:20}
                            );

                            found = true;

                            document.getElementById('layerInfo').style.display='block';
                            document.getElementById('layerInfo').innerHTML =
                                '<b>Survey Result</b><br>' +
                                JSON.stringify(props);

                            break;
                        }
                    }
                });
            }
        });

        if(!found){
            alert('Survey Number Not Found');
        }
    }
});

map.on('singleclick', function(evt){

    let info = '';

    map.forEachFeatureAtPixel(evt.pixel, function(feature){

        let props = feature.getProperties();

        for(let key in props){

            if(key !== 'geometry'){
                info += '<b>' + key + ':</b> ' + props[key] + '<br>';
            }
        }
    });

    if(info !== ''){
        document.getElementById('layerInfo').style.display='block';
        document.getElementById('layerInfo').innerHTML = info;
    }
});

</script>

</body>
</html>
