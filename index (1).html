<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body {
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 
        </style>

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        
        /* Floating Toolbar design for premium Mobile Capability */
        .floating-toolbar {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 22px;
            border-radius: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.18);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px; /* Safe finger tap distance between icons */
            z-index: 2000;
            max-width: 92%;
            overflow-x: auto;
            border: 1px solid rgba(0,0,0,0.06);
            scrollbar-width: none;
        }
        .floating-toolbar::-webkit-scrollbar {
            display: none;
        }
        .tool-btn {
            background: #ffffff;
            border: none;
            color: #333333;
            border-radius: 50%;
            width: 48px; /* Standard touch target size */
            height: 48px;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }
        .tool-btn:active, .tool-btn.active {
            background: #007bff;
            color: #ffffff;
            transform: scale(1.12);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.35);
        }
        #kml-upload {
            display: none;
        }
        /* Prevention of UI overlaps */
        .ol-attribution, .ol-scale-line {
            bottom: 95px !important;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>

        <!-- Mobile Floating Toolbar Interface -->
        <div class="floating-toolbar">
            <button id="btn-gps" class="tool-btn" title="Live GPS (On/Off)">
                <i class="fas fa-location-arrow"></i>
            </button>
            <button id="btn-pin" class="tool-btn" title="Add Note Pin">
                <i class="fas fa-map-marker-alt"></i>
            </button>
            <button id="btn-measure" class="tool-btn" title="Two-Point Measurement">
                <i class="fas fa-ruler"></i>
            </button>
            <button id="btn-upload" class="tool-btn" title="Upload KML/JSON" onclick="document.getElementById('kml-upload').click()">
                <i class="fas fa-upload"></i>
            </button>
            <input type="file" id="kml-upload" accept=".kml,.json,.geojson">
            <button id="btn-download" class="tool-btn" title="Download Layer KML">
                <i class="fas fa-download"></i>
            </button>
            <button id="btn-directions" class="tool-btn" title="Get Directions">
                <i class="fas fa-route"></i>
            </button>
        </div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="resources/proj4.js"></script>
        <script>proj4.defs('EPSG:3857','+proj=merc +a=6378137 +b=6378137 +lat_ts=0 +lon_0=0 +x_0=0 +y_0=0 +k=1 +units=m +nadgrids=@null +wktext +no_defs');</script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="resources/olms.js"></script>
        <script src="layers/VillageBoundary_3.js"></script><script src="layers/Surveyline_4.js"></script>
        <script src="styles/VillageBoundary_3_style.js"></script><script src="styles/Surveyline_4_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>        

        <!-- Interactive GIS Features Logic Script -->
        <script>
        (function() {
            var checkMapInterval = setInterval(function() {
                if (typeof map !== 'undefined' && map instanceof ol.Map) {
                    clearInterval(checkMapInterval);
                    initializeMobileGISFeatures();
                }
            }, 100);

            function initializeMobileGISFeatures() {
                // 1. Live Geolocation GPS Tracking Layer
                var geolocation = new ol.Geolocation({
                    trackingOptions: { enableHighAccuracy: true },
                    projection: map.getView().getProjection()
                });

                var positionFeature = new ol.Feature();
                positionFeature.setStyle(new ol.style.Style({
                    image: new ol.style.Circle({
                        radius: 8,
                        fill: new ol.style.Fill({ color: '#007bff' }),
                        stroke: new ol.style.Stroke({ color: '#ffffff', width: 3 })
                    })
                }));

                var gpsSource = new ol.source.Vector({ features: [positionFeature] });
                var gpsLayer = new ol.layer.Vector({ source: gpsSource });
                map.addLayer(gpsLayer);

                geolocation.on('change:position', function() {
                    var coordinates = geolocation.getPosition();
                    positionFeature.setGeometry(coordinates ? new ol.geom.Point(coordinates) : null);
                    if (coordinates) {
                        map.getView().setCenter(coordinates);
                        map.getView().setZoom(17);
                    }
                });

                var gpsActive = false;
                document.getElementById('btn-gps').addEventListener('click', function() {
                    gpsActive = !gpsActive;
                    geolocation.setTracking(gpsActive);
                    if (gpsActive) {
                        this.classList.add('active');
                    } else {
                        this.classList.remove('active');
                        positionFeature.setGeometry(null);
                    }
                });

                // 2. Custom Drawing Source Layer for Notes & Measurements
                var customSource = new ol.source.Vector();
                var customLayer = new ol.layer.Vector({
                    source: customSource,
                    style: new ol.style.Style({
                        fill: new ol.style.Fill({ color: 'rgba(255, 204, 51, 0.2)' }),
                        stroke: new ol.style.Stroke({ color: '#ffcc33', width: 3 }),
                        image: new ol.style.Circle({
                            radius: 7,
                            fill: new ol.style.Fill({ color: '#ffcc33' }),
                            stroke: new ol.style.Stroke({ color: '#ffffff', width: 2 })
                        })
                    })
                });
                map.addLayer(customLayer);

                var currentInteraction = null;

                function clearInteractions() {
                    if (currentInteraction) {
                        map.removeInteraction(currentInteraction);
                        currentInteraction = null;
                    }
                    document.getElementById('btn-pin').classList.remove('active');
                    document.getElementById('btn-measure').classList.remove('active');
                    document.getElementById('btn-directions').classList.remove('active');
                }

                // Note Pin Addition Action
                document.getElementById('btn-pin').addEventListener('click', function() {
                    var wasActive = this.classList.contains('active');
                    clearInteractions();
                    if (!wasActive) {
                        this.classList.add('active');
                        currentInteraction = new ol.interaction.Draw({
                            source: customSource,
                            type: 'Point'
                        });
                        currentInteraction.on('drawend', function(e) {
                            var note = prompt('ഈ പിന്നിനായി ഒരു നോട്ട് നൽകുക (Enter text for Note Pin):');
                            if (note) {
                                e.feature.set('description', note);
                            } else {
                                setTimeout(function() { customSource.removeFeature(e.feature); }, 10);
                            }
                        });
                        map.addInteraction(currentInteraction);
                    }
                });

                // Two-Point Measurement Action
                document.getElementById('btn-measure').addEventListener('click', function() {
                    var wasActive = this.classList.contains('active');
                    clearInteractions();
                    if (!wasActive) {
                        this.classList.add('active');
                        currentInteraction = new ol.interaction.Draw({
                            source: customSource,
                            type: 'LineString',
                            maxPoints: 2
                        });
                        currentInteraction.on('drawend', function(e) {
                            var geometry = e.feature.getGeometry();
                            var length = 0;
                            if (ol.sphere && ol.sphere.getLength) {
                                length = ol.sphere.getLength(geometry);
                            } else if (ol.Sphere && ol.Sphere.getLength) {
                                length = ol.Sphere.getLength(geometry);
                            } else {
                                length = geometry.getLength();
                            }
                            var output = length > 1000 ? (Math.round(length / 1000 * 100) / 100 + ' km') : (Math.round(length * 100) / 100 + ' m');
                            e.feature.set('description', 'Measured Distance: ' + output);
                            alert('അളന്ന ദൂരം (Distance): ' + output);
                        });
                        map.addInteraction(currentInteraction);
                    }
                });

                // Interactive Two Point Driving Directions Action via Google Maps
                var directionPoints = [];
                document.getElementById('btn-directions').addEventListener('click', function() {
                    var wasActive = this.classList.contains('active');
                    clearInteractions();
                    directionPoints = [];
                    if (!wasActive) {
                        this.classList.add('active');
                        alert('മാപ്പിൽ ആരംഭിക്കുന്ന പോയിന്റ് ക്ലിക്ക് ചെയ്യുക (Select Start Point)');
                        currentInteraction = new ol.interaction.Draw({
                            source: customSource,
                            type: 'Point'
                        });
                        currentInteraction.on('drawend', function(e) {
                            var coords = e.feature.getGeometry().getCoordinates();
                            var lonLat = ol.proj.toLonLat(coords, map.getView().getProjection());
                            directionPoints.push(lonLat);
                            
                            if (directionPoints.length === 1) {
                                alert('തുടങ്ങുന്ന പോയിന്റ് സെറ്റ് ചെയ്തു. ഇനി അവസാന പോയിന്റ് മാപ്പിൽ ക്ലിക്ക് ചെയ്യുക (Select Destination Point).');
                            } else if (directionPoints.length === 2) {
                                var start = directionPoints[0];
                                var end = directionPoints[1];
                                var gmapsUrl = 'https://www.google.com/maps/dir/?api=1&origin=' + start[1] + ',' + start[0] + '&destination=' + end[1] + ',' + end[0] + '&travelmode=driving';
                                window.open(gmapsUrl, '_blank');
                                customSource.removeFeature(e.feature);
                                clearInteractions();
                            }
                        });
                        map.addInteraction(currentInteraction);
                    }
                });

                // KML / GeoJSON Layer Upload Handling
                document.getElementById('kml-upload').addEventListener('change', function(e) {
                    var file = e.target.files[0];
                    if (!file) return;
                    var reader = new FileReader();
                    reader.onload = function(evt) {
                        var text = evt.target.result;
                        var format = file.name.endsWith('.kml') ? new ol.format.KML({ extractStyles: true }) : new ol.format.GeoJSON();
                        try {
                            var features = format.readFeatures(text, {
                                featureProjection: map.getView().getProjection(),
                                dataProjection: file.name.endsWith('.kml') ? 'EPSG:4326' : undefined
                            });
                            customSource.addFeatures(features);
                            if (features.length > 0) {
                                map.getView().fit(customSource.getExtent(), { size: map.getSize(), maxZoom: 16 });
                            }
                            alert('ഫയൽ വിജയകരമായി അപ്‌ലോഡ് ചെയ്‌തു!');
                        } catch(err) {
                            alert('ഫയൽ റീഡ് ചെയ്യുന്നതിൽ പരാജയം: ' + err.message);
                        }
                    };
                    reader.readAsText(file);
                });

                // KML Layer Export & Download Handling
                document.getElementById('btn-download').addEventListener('click', function() {
                    var features = customSource.getFeatures();
                    if (features.length === 0) {
                        alert('ഡൗൺലോഡ് ചെയ്യാൻ ഡാറ്റ ലഭ്യമല്ല!');
                        return;
                    }
                    var format = new ol.format.KML();
                    var kmlText = format.writeFeatures(features, {
                        featureProjection: map.getView().getProjection(),
                        dataProjection: 'EPSG:4326'
                    });
                    var blob = new Blob([kmlText], { type: 'application/vnd.google-earth.kml+xml' });
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = 'map_export_data.kml';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                });

                // View Popup Content on click
                map.on('singleclick', function(evt) {
                    var feature = map.forEachFeatureAtPixel(evt.pixel, function(f) {
                        return f;
                    });
                    if (feature && feature.get('description')) {
                        var overlays = map.getOverlays().getArray();
                        var content = document.getElementById('popup-content');
                        if (overlays.length > 0 && content) {
                            content.innerHTML = '<div style="padding: 6px; font-family: system-ui, sans-serif; font-size: 13px; color:#333;">' + feature.get('description') + '</div>';
                            overlays[0].setPosition(evt.coordinate);
                        } else {
                            alert(feature.get('description'));
                        }
                    }
                });
            }
        })();
        </script>
    </body>
</html>
